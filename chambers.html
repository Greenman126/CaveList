<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide Cave Rankings - Largest Chambers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <img src="NSSGeo_draft4-2-2026.svg" alt="NSS Geo2 Logo" class="header-logo">
    <h1 class="page-title">Worldwide Cave Rankings - Largest Chambers</h1>
    <nav class="site-navigation">
        <div class="nav-group">
            <span class="group-label">Worldwide:</span>
            <a href="index.html" class="nav-link">Longest</a>
            <a href="deepest.html" class="nav-link">Deepest</a>
            <a href="pits.html" class="nav-link">Pits</a>
            <a href="chambers.html" class="nav-link">Chambers</a>
        </div>
        <div class="nav-separator"></div>
        <div class="nav-group">
            <span class="group-label">USA:</span>
            <a href="usa_longest.html" class="nav-link">Longest</a>
            <a href="usa_deepest.html" class="nav-link">Deepest</a>
            <a href="usa_pits.html" class="nav-link">Pits</a>
        </div>
    </nav>
</header>

    <main class="container">
        <section class="filters">
            <div class="top-controls">
                <input type="text" id="searchInput" placeholder="Search chambers or countries...">
                
                <button id="unitToggleBtn" class="secondary-btn">Switch to Imperial (ft/ft²)</button>

                <div class="entries-control">
                    <label for="perPageSelect">Entries per page:</label>
                    <select id="perPageSelect">
                        <option value="100" selected>100</option>
                        <option value="500">500</option>
                        <option value="all">All</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="table-container">
            <table id="caveTable">
                <thead>
                    <tr>
                        <th># Rank</th> <th class="sortable" data-sort="cave_name">Chamber Name</th>
                        <th class="sortable" data-sort="country">Country</th>
                        <th class="sortable" data-sort="area_m2">Area</th>
                        <th class="sortable" data-sort="volume_million_m3">Volume</th>
                        <th class="sortable" data-sort="height_m">Height</th>
                        <th>Dimensions (L x W x H)</th>
                        <th class="sortable" data-sort="data_type">Rank Type</th>
                        <th>Source</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="paginationControls" class="pagination-controls"></div>
    </main>

    <script src="chambers_script.js"></script>
</body>
</html>
