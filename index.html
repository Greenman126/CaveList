<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide Cave Rankings</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Worldwide Cave Rankings</h1>
        <nav>
            <a href="#" id="longestCavesBtn">Longest Caves</a>
            <a href="#" id="deepestCavesBtn">Deepest Caves</a>
            <a href="#">Deep Pits</a>
            <a href="#">Largest Chambers</a>
        </nav>
    </header>

    <main class="container">
        <section class="filters">
            <div class="filter-group">
                <span>Filter by Type:</span>
                <button class="filter-btn active" data-type="All">All</button>
                <button class="filter-btn" data-type="limestone">Limestone</button>
                <button class="filter-btn" data-type="gypsum">Gypsum</button>
                <button class="filter-btn" data-type="lava">Lava</button>
                <button class="filter-btn" data-type="underwater">Underwater</button>
                <button class="filter-btn" data-type="salt">Salt</button>
                <button class="filter-btn" data-type="sandstone_quartzite">Sandstone/Quartzite</button>
                <button class="filter-btn" data-type="piping">Piping</button>
            </div>

            <div class="top-controls">
                <input type="text" id="searchInput" placeholder="Search caves...">
                
                <button id="unitToggleBtn" class="secondary-btn">Switch to Imperial (mi/ft)</button>

                <div class="entries-control">
                    <label for="perPageSelect">Entries per page:</label>
                    <select id="perPageSelect">
                        <option value="100" selected>100</option>
                        <option value="500">500</option>
                        <option value="1000">1000</option>
                        <option value="all">All</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="table-container">
            <table id="caveTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th class="sortable" data-sort="name">Name ↕</th>
                        <th class="sortable" data-sort="country">Country ↕</th>
                        <th class="sortable" data-sort="state">State/Province ↕</th>
                        <th class="sortable" data-sort="county">County ↕</th>
                        <th class="sortable" data-sort="length">Length ↕</th>
                        <th class="sortable" data-sort="depth">Depth ↕</th>
                        <th class="sortable" data-sort="type">Type ↕</th>
                        <th>Source</th>
                        <th>Date</th>
                        <th>Comment</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>

        <div id="paginationControls" class="pagination-controls"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
