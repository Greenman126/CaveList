<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>World Caves Database</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <style>
        body { background-color: #fff; color: #000; font-family: "Courier New", Courier, monospace; font-size: 13px; padding: 20px; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 5px; font-size: 20px; }
        table.dataTable { border: 1px solid #000 !important; border-collapse: collapse !important; }
        table.dataTable thead th, table.dataTable tfoot th { background-color: #eee; border: 1px solid #000 !important; text-transform: uppercase; font-weight: bold; padding: 8px !important; }
        table.dataTable td { border: 1px solid #ccc !important; padding: 4px 8px !important; }
        tfoot input { width: 100%; padding: 3px; box-sizing: border-box; font-family: monospace; font-size: 11px; border: 1px solid #000; }
    </style>
</head>
<body>

<h1>WORLD CAVES DATABASE</h1>
<p>Interactive Archive - All Records</p>

<table id="caverTable" class="display" style="width:100%">
    <thead>
        <tr>
            <th>Type</th>
            <th>Name</th>
            <th>Country</th>
            <th>State</th>
            <th>County</th>
            <th>Length (m)</th>
            <th>Depth (m)</th>
            <th>Source</th>
            <th>Date</th>
            <th>Comment</th>
        </tr>
    </thead>
    <tfoot>
        <tr>
            <th>Type</th>
            <th>Name</th>
            <th>Country</th>
            <th>State</th>
            <th>County</th>
            <th>Length (m)</th>
            <th>Depth (m)</th>
            <th>Source</th>
            <th>Date</th>
            <th>Comment</th>
        </tr>
    </tfoot>
</table>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function() {
    // Setup - add a text input to each footer cell
    $('#caverTable tfoot th').each(function () {
        var title = $(this).text();
        $(this).html('<input type="text" placeholder="Filter ' + title + '" />');
    });

    // Initialize DataTable
    var table = $('#caverTable').DataTable({
        "ajax": "caves_data.json",
        "lengthMenu": [ [10, 25, 50, 100, -1], [10, 25, 50, 100, "All"] ],
        "pageLength": -1, 
        "order": [[5, "desc"]],
        "columns": [
            { "data": "type" },
            { "data": "cave_name" },
            { "data": "country" },
            { "data": "state" },
            { "data": "county" },
            { "data": "length_meters" },
            { "data": "depth_meters" },
            { "data": "source" },
            { "data": "date" },
            { "data": "comment" }
        ],
        "columnDefs": [
            { "targets": "_all", "className": "dt-nowrap" }
        ]
    });

    // Apply the search
    table.columns().every(function () {
        var that = this;
        $('input', this.footer()).on('keyup change clear', function () {
            if (that.search() !== this.value) {
                that.search(this.value).draw();
            }
        });
    });
});
</script>
</body>
</html>
