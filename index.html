<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worldwide Cave Rankings - My Version</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Worldwide Cave Rankings</h1>
        <nav>
            <a href="#">Longest Caves</a>
            <a href="#">Deepest Caves</a>
            <a href="#">Deep Pits</a>
            <a href="#">Largest Chambers</a>
        </nav>
    </header>

    <main>
        <div class="table-container">
            <table id="caveTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Country</th>
                        <th>State/Province</th>
                        <th>County</th>
                        <th>Length</th>
                        <th>Depth</th>
                        <th>Source</th>
                        <th>Date</th>
                        <th>Comment</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
