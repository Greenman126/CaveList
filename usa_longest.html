<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USA Cave Rankings - Longest Caves</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <h1 class="page-title">USA Cave Rankings - Longest Caves</h1>
    <nav class="site-navigation">
        <div class="nav-group">
            <span class="group-label">Worldwide:</span>
            <a href="index.html" class="nav-link">Longest</a>
            <a href="deepest.html" class="nav-link">Deepest</a>
            <a href="pits.html" class="nav-link">Pits</a>
            <a href="chambers.html" class="nav-link">Chambers</a>
        </div>
        <div class="nav-separator"></div>
        <div class="nav-group">
            <span class="group-label">USA:</span>
            <a href="usa_longest.html" class="nav-link">Longest</a>
            <a href="usa_deepest.html" class="nav-link">Deepest</a>
            <a href="usa_pits.html" class="nav-link">Pits</a>
        </div>
    </nav>
</header>

    <main class="container">
        <section class="filters">
            <div class="filter-group">
                <span>Filter by Type:</span>
                <button class="filter-btn active" data-type="all">All</button>
                <button class="filter-btn" data-type="limestone">Limestone</button>
                <button class="filter-btn" data-type="lava">Lava</button>
                <button class="filter-btn" data-type="gypsum">Gypsum</button>
            </div>

            <div class="top-controls">
                <input type="text" id="searchInput" placeholder="Search USA caves...">
                <button id="unitToggleBtn" class="secondary-btn">Switch to Imperial (mi/ft)</button>
                <div class="entries-control">
                    <label for="perPageSelect">Entries per page:</label>
                    <select id="perPageSelect">
                        <option value="100" selected>100</option>
                        <option value="500">500</option>
                        <option value="all">All</option>
                    </select>
                </div>
            </div>
        </section>

        <div class="table-container">
            <table id="caveTable">
                <thead>
                    <tr>
                        <th># Rank</th>
                        <th class="sortable" data-sort="name">Cave Name ↕</th>
                        <th class="sortable" data-sort="state">State ↕</th>
                        <th class="sortable" data-sort="county">County ↕</th>
                        <th class="sortable" data-sort="length">Length ↕</th>
                        <th class="sortable" data-sort="depth">Depth ↕</th>
                        <th class="sortable" data-sort="type">Type ↕</th>
                        <th>Source</th>
                        <th class="sortable" data-sort="date">Updated ↕</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div id="paginationControls" class="pagination-controls"></div>
    </main>
    <script src="usa_longest_script.js"></script>
</body>
</html>
